name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build zip
        run: |
          zip -r plg_system_markdownmirror.zip \
            markdownmirror.php \
            markdownmirror.xml \
            vendor/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plg_system_markdownmirror.zip
          generate_release_notes: true

      - name: Update updates.xml
        run: |
          python3 - <<'PYEOF'
          import os
          version = os.environ['VERSION']
          tag = os.environ['GITHUB_REF_NAME']
          url = f"https://github.com/Buchs-Dev/markdownmirror/releases/download/{tag}/plg_system_markdownmirror.zip"
          xml = f"""<?xml version="1.0" encoding="utf-8"?>
<updates>
    <update>
        <name>System - Markdown Mirror</name>
        <description>Outputs Markdown versions of Joomla pages when ?md=1 is present. Designed for AI agent consumption.</description>
        <element>markdownmirror</element>
        <type>plugin</type>
        <folder>system</folder>
        <client>0</client>
        <version>{version}</version>
        <downloads>
            <downloadurl type="full" format="zip">{url}</downloadurl>
        </downloads>
        <tags>
            <tag>stable</tag>
        </tags>
        <targetplatform name="joomla" version="(5|6)\\.[0-9]+" />
    </update>
</updates>
"""
          with open('updates.xml', 'w') as f:
              f.write(xml.lstrip())
          PYEOF

      - name: Commit and push updates.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.xml
          git commit -m "chore: update updates.xml for ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:master