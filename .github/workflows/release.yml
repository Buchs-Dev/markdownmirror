name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build zip
        run: |
          zip -r plg_system_markdownmirror.zip \
            markdownmirror.xml \
            services/ \
            src/ \
            vendor/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plg_system_markdownmirror.zip
          generate_release_notes: true

      - name: Update updates.xml
        run: |
          DOWNLOAD_URL="https://github.com/Buchs-Dev/markdownmirror/releases/download/${GITHUB_REF_NAME}/plg_system_markdownmirror.zip"
          SHA256="$(sha256sum plg_system_markdownmirror.zip | awk '{print $1}')"
          sed -i "s|<version>[^<]*</version>|<version>${VERSION}</version>|" updates.xml
          sed -i "s|<downloadurl[^>]*>[^<]*</downloadurl>|<downloadurl type=\"full\" format=\"zip\">${DOWNLOAD_URL}</downloadurl>|" updates.xml
          sed -i "s|<sha256>[^<]*</sha256>|<sha256>${SHA256}</sha256>|" updates.xml

      - name: Commit and push updates.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.xml
          git commit -m "chore: update updates.xml for ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:master